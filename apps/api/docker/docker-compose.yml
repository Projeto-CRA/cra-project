version: '3.8'
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: cra
      POSTGRES_PASSWORD: cra_test
      POSTGRES_DB: cra_test
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cra -d cra_test"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: